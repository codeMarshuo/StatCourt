<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NBA 球队 · StatCourt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a1929 0%, #1a2027 50%, #0d1b2a 100%);
      color: #eaf6fb;
      min-height: 100vh;
      line-height: 1.6;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(10, 25, 41, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-inner {
      max-width: 1600px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: 800;
      color: #00d4ff;
      letter-spacing: -0.5px;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 2rem;
    }

    .nav-links a {
      color: #bcd3df;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #00d4ff;
    }

    .teams-main {
      display: flex;
      min-height: 100vh;
      padding-top: 70px;
    }

    .teams-left {
      width: 320px;
      min-width: 320px;
      background: rgba(10, 25, 41, 0.6);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      overflow-y: auto;
      height: calc(100vh - 70px);
      position: sticky;
      top: 70px;
    }

    .teams-header {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .teams-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 1rem;
    }

    .conference-tabs {
      display: flex;
      gap: 0.5rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #bcd3df;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 0.5rem;
    }

    .tab-btn.active {
      background: linear-gradient(90deg, #00d4ff, #3bc9ff);
      color: #023046;
      border-color: transparent;
    }

    .tab-btn:hover:not(.active) {
      background: rgba(0, 212, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.3);
    }

    .teams-list {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .team-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .team-item:hover {
      background: rgba(0, 212, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.3);
      transform: translateX(5px);
    }

    .team-item.active {
      background: rgba(0, 212, 255, 0.15);
      border-color: rgba(0, 212, 255, 0.5);
    }

    .team-logo {
      width: 50px;
      height: 50px;
      object-fit: contain;
      border-radius: 0.5rem;
    }

    .team-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }

    .teams-right {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      height: calc(100vh - 70px);
    }

    .team-detail-container {
      display: none;
    }

    .team-detail-container.visible {
      display: block;
    }

    .team-header-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 2rem;
      margin-bottom: 2rem;
      display: flex;
      gap: 2rem;
      align-items: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .team-banner {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }

    .team-info {
      flex: 1;
    }

    .team-title-name {
      font-size: 2.5rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .team-meta {
      font-size: 1rem;
      color: #9bd1e3;
      margin-bottom: 1.5rem;
    }

    .team-stats-row {
      display: flex;
      gap: 1.5rem;
    }

    .team-stat-box {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 1rem;
      padding: 1rem 1.5rem;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .team-stat-label {
      font-size: 0.85rem;
      color: #9bd1e3;
      margin-bottom: 0.25rem;
    }

    .team-stat-value {
      font-size: 1.5rem;
      font-weight: 800;
    }

    .team-stat-value.win { color: #4ade80; }
    .team-stat-value.lose { color: #f87171; }
    .team-stat-value.winper { color: #fbbf24; }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 24px;
      background: linear-gradient(180deg, #00d4ff, #3bc9ff);
      border-radius: 2px;
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .player-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .player-card:hover {
      background: rgba(0, 212, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.3);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
    }

    .player-card.active {
      background: rgba(0, 212, 255, 0.15);
      border-color: rgba(0, 212, 255, 0.5);
    }

    .player-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(0, 212, 255, 0.3);
    }

    .player-info {
      flex: 1;
    }

    .player-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.25rem;
    }

    .player-stats-mini {
      font-size: 0.85rem;
      color: #9bd1e3;
    }

    .player-stats-mini span {
      color: #00d4ff;
      font-weight: 600;
    }

    .player-detail-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 2rem;
      margin-top: 2rem;
      display: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .player-detail-card.visible {
      display: block;
    }

    .player-detail-header {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
      align-items: center;
    }

    .player-detail-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #00d4ff;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
    }

    .player-detail-info {
      flex: 1;
    }

    .player-detail-name {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .player-detail-meta {
      font-size: 1rem;
      color: #9bd1e3;
      margin-bottom: 1rem;
    }

    .player-detail-stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1rem;
    }

    .stat-item {
      text-align: center;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stat-item-label {
      font-size: 0.8rem;
      color: #9bd1e3;
      margin-bottom: 0.25rem;
    }

    .stat-item-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: #00d4ff;
    }

    .radar-chart-container {
      width: 100%;
      height: 400px;
      margin-top: 2rem;
    }

    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 400px;
      color: #9bd1e3;
      font-size: 1.25rem;
    }

    .footer {
      background: rgba(10, 25, 41, 0.8);
      backdrop-filter: blur(20px);
      padding: 2rem 0;
      text-align: center;
      color: #9bd1e3;
      font-size: 0.875rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 1024px) {
      .teams-main {
        flex-direction: column;
      }

      .teams-left {
        width: 100%;
        min-width: 100%;
        height: auto;
        position: relative;
        top: 0;
      }

      .teams-right {
        height: auto;
      }

      .team-header-card {
        flex-direction: column;
        text-align: center;
      }

      .player-detail-stats {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .team-title-name {
        font-size: 2rem;
      }

      .players-grid {
        grid-template-columns: 1fr;
      }

      .player-detail-stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

  <main class="teams-main">
    <aside class="teams-left">
      <header class="teams-header">
        <h1 class="teams-title">NBA 球队</h1>
        <div class="conference-tabs">
          <button class="tab-btn active" data-conference="east">东部</button>
          <button class="tab-btn" data-conference="west">西部</button>
        </div>
      </header>
      <div class="teams-list" id="teamsList"></div>

    <section class="teams-right">
      <div class="team-detail-container" id="teamDetailContainer">

              <h4 style="font-size: 1rem; font-weight: 700; color: #00d4ff; margin-bottom: 0.75rem;">球队历史</h4>
              <p id="teamHistory" style="font-size: 0.9rem; color: #bcd3df; line-height: 1.8;">—</p>
            </div>
          </div>
        </div>

        <h3 class="section-title">球队球员</h3>
        <div class="players-grid" id="playersGrid"></div>

        <div class="player-detail-card" id="playerDetailCard">
          <div class="player-detail-header">
            <img id="playerDetailAvatar" src="" alt="" class="player-detail-avatar">
            <div class="player-detail-info">
              <h3 class="player-detail-name" id="playerDetailName">—</h3>
              <p class="player-detail-meta" id="playerDetailMeta">—</p>
              <div class="player-detail-stats" id="playerDetailStats"></div>
            </div>
          </div>
          <div id="radarChart" class="radar-chart-container"></div>
        </div>
      </div>

      <div class="placeholder" id="placeholder">
        <p>👈 点击左侧球队查看详情</p>
      </div>
    </section>
  </main>

  <script>

    const TEAM_BANNER_BASE = './assets/全新NBA球队logo/';

    const TEAM_CONFERENCE = {
      '雷霆': 'west', '掘金': 'west', '热火': 'east', '森林狼': 'west', '骑士': 'east',
      '尼克斯': 'east', '雄鹿': 'east', '76人': 'east', '步行者': 'east', '魔术': 'east',

    };

    const TEAM_HISTORY = {
      '雷霆': '前身 1967 年 ABA 联盟的西雅图超音速队，1976 年加入 NBA，2008 年迁至俄克拉荷马城更名雷霆，官方认定其承接超音速队史。1979 年超音速时期夺得队史唯一总冠军，2012 年杜兰特 + 威斯布鲁克 + 哈登三少带队闯入总决赛，以超强选秀培养能力闻名。',
      '掘金': '前身 1967 年 ABA 联盟的丹佛火箭队，1974 年更名掘金，1976 年随 ABA-NBA 合并加入联盟。2023 年尼古拉・约基奇带队夺得队史首冠，终结了队史无冠的历史，是西部老牌劲旅。',
      '热火': '1988 年联盟扩军成立，队史 3 次总冠军：2006 年德怀恩・韦德 + 沙奎尔・奥尼尔带队夺冠，2012、2013 年詹姆斯 / 韦德 / 波什三巨头两连冠。队史 6 次闯入总决赛，以极致韧性和纪律性的球队文化著称。',
      '森林狼': '1989 年联盟扩军成立，至今未获总冠军，队史两次闯入西决：2004 年凯文・加内特带队、2024 年安东尼・爱德华兹带队，加内特时期缔造了队史第一个巅峰。',
      '骑士': '1970 年联盟扩军成立，队史核心巅峰由勒布朗・詹姆斯缔造。2016 年詹姆斯带队完成总决赛 1-3 史诗级逆转，击败勇士夺得队史首冠，终结了克利夫兰体育界 52 年四大联盟无冠的历史。',
      '尼克斯': '1946 年 BAA 创始球队，与凯尔特人同为联盟从未搬迁更名的球队，主场麦迪逊广场花园被誉为 “篮球麦加”。队史 2 次总冠军（1970、1973），由威利斯・里德、沃尔特・弗雷泽带队；90 年代尤因带队两进总决赛，2024 年时隔 21 年重返总决赛舞台。',
      '雄鹿': '1968 年联盟扩军成立，建队仅 3 年便在 1971 年由贾巴尔 + 奥斯卡・罗伯特森带队夺得队史首冠，2021 年扬尼斯・阿德托昆博带队再夺总冠军，是联盟历史上夺冠速度最快的球队之一。',
      '76人': '前身 1946 年成立的锡拉丘兹民族队，1963 年迁至费城更名 76 人（纪念 1776 年《独立宣言》在费城签署）。队史 3 次总冠军：1955 年民族队时期、1967 年张伯伦带队、1983 年 J 博士 + 摩西・马龙带队；2001 年艾弗森单核带队闯入总决赛，是东部传统豪门。',
      '步行者': '前身 1967 年 ABA 联盟印第安纳步行者队，ABA 时期 3 次夺得总冠军，1976 年随 ABA-NBA 合并加入联盟。NBA 时期至今未夺冠，2000 年雷吉・米勒带队闯入总决赛，以强硬球风和关键球文化著称。',
      '魔术': '1989 年联盟扩军成立，至今未获总冠军，两次闯入总决赛：1995 年沙奎尔・奥尼尔 + 安芬尼・哈达威带队，2009 年德怀特・霍华德带队，是联盟天赋型球队的代表。',

      '开拓者': '1970 年联盟扩军成立，1977 年比尔・沃顿带队夺得队史唯一总冠军。队史 3 次闯入总决赛，曾创下 1983-2003 年连续 21 年闯入季后赛的联盟第二长纪录，标志性球星包括克莱德・德雷克斯勒、达米安・利拉德。'

    async function loadData() {
      try {
        const response = await axios({
          method: 'GET',
          url: `${API_BASE_URL}/api/data`,
          headers: { 'Content-Type': 'application/json' }
        });

        const res = response.data;
        if (res && (res.code === 200 || res.code === 0)) {
          teamsData = res.data.teams || [];
          playersData = res.data.players || [];
          renderTeams('east');
        }
      } catch (error) {
        console.error('加载数据失败:', error);
      }
    }

    function getTeamShortName(teamName) {
      if (!teamName) return '';
      const parts = teamName.split(' ');
      return parts.length > 1 ? parts[parts.length - 1] : teamName;
    }

    function renderTeams(conference) {
      const listEl = document.getElementById('teamsList');
      listEl.innerHTML = '';

      const filteredTeams = teamsData.filter(team => {
        const shortName = getTeamShortName(team.team || team.Team);
        return TEAM_CONFERENCE[shortName] === conference;
      });

      filteredTeams.forEach((team) => {
        const shortName = getTeamShortName(team.team || team.Team);
        const teamItem = document.createElement('div');
        teamItem.className = 'team-item';
        teamItem.innerHTML = `
          <img src="${team.teamimage || team.Teamimage || team.TeamImage || ''}" alt="${team.team || team.Team || ''}" class="team-logo">
          <span class="team-name">${team.team || team.Team || '未知'}</span>
        `;

        teamItem.addEventListener('click', () => {
          document.querySelectorAll('.team-item').forEach(item => item.classList.remove('active'));
          teamItem.classList.add('active');
          showTeamDetail(team);
        });

        listEl.appendChild(teamItem);
      });
    }

    function showTeamDetail(team) {
      currentTeam = team;
      const shortName = getTeamShortName(team.team || team.Team);

      document.getElementById('teamBanner').src = TEAM_BANNER_BASE + (TEAM_BANNER_MAP[shortName] || '');
      document.getElementById('teamTitleName').textContent = team.team || team.Team || '未知';
      document.getElementById('teamMeta').textContent = `排名 #${team.teamrank || team.Teamrank || '-'} | 场次 ${team.NumberOfMatches || team.numberOfMatches || '-'}`;

      document.getElementById('teamStatsRow').innerHTML = `
        <div class="team-stat-box">
          <div class="team-stat-label">胜场</div>
          <div class="team-stat-value win">${team.win || team.Win || 0}</div>
        </div>
        <div class="team-stat-box">
          <div class="team-stat-label">负场</div>
          <div class="team-stat-value lose">${team.lose || team.Lose || 0}</div>
        </div>
        <div class="team-stat-box">
          <div class="team-stat-label">胜率</div>
          <div class="team-stat-value winper">${team.winper || team.Winper || '0%'}</div>
        </div>
      `;

      const history = TEAM_HISTORY[shortName] || '暂无球队历史信息。';
      document.getElementById('teamHistory').textContent = history;

      const teamPlayers = playersData.filter(p => (p.team || p.Team) === shortName);
      renderPlayers(teamPlayers);

      document.getElementById('teamDetailContainer').classList.add('visible');
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('playerDetailCard').classList.remove('visible');
    }

    function renderPlayers(players) {
      const grid = document.getElementById('playersGrid');
      grid.innerHTML = '';

      if (players.length === 0) {
        grid.innerHTML = '<p style="color: #9bd1e3; text-align: center; width: 100%;">暂无球员数据</p>';
        return;
      }

      players.forEach(player => {
        const card = document.createElement('div');
        card.className = 'player-card';
        card.innerHTML = `
          <img src="${player.playerImage || player.PlayerImage || ''}" alt="${player.playerName || player.PlayerName || ''}" class="player-avatar">
          <div class="player-info">
            <div class="player-name">${player.playerName || player.PlayerName || '未知'}</div>
            <div class="player-stats-mini">
              得分 <span>${player.score || player.Score || 0}</span> | 
              篮板 <span>${player.rebound || player.Rebound || 0}</span> | 
              助攻 <span>${player.assist || player.Assist || 0}</span>
            </div>
          </div>
        `;

        card.addEventListener('click', () => {
          document.querySelectorAll('.player-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          showPlayerDetail(player);
        });

        grid.appendChild(card);
      });
    }

    function showPlayerDetail(player) {
      const detailCard = document.getElementById('playerDetailCard');
      
      document.getElementById('playerDetailAvatar').src = player.playerImage || player.PlayerImage || '';
      document.getElementById('playerDetailName').textContent = player.playerName || player.PlayerName || '未知';
      document.getElementById('playerDetailMeta').textContent = `${player.team || player.Team || '未知'} | 排名 #${player.playerRank || player.PlayerRank || '-'}`;

      document.getElementById('playerDetailStats').innerHTML = `
        <div class="stat-item">
          <div class="stat-item-label">得分</div>
          <div class="stat-item-value">${player.score || player.Score || 0}</div>
        </div>
        <div class="stat-item">
          <div class="stat-item-label">篮板</div>
          <div class="stat-item-value">${player.rebound || player.Rebound || 0}</div>
        </div>
        <div class="stat-item">
          <div class="stat-item-label">助攻</div>
          <div class="stat-item-value">${player.assist || player.Assist || 0}</div>
        </div>
        <div class="stat-item">
          <div class="stat-item-label">抢断</div>
          <div class="stat-item-value">${player.steal || player.Steal || 0}</div>
        </div>
        <div class="stat-item">
          <div class="stat-item-label">盖帽</div>
          <div class="stat-item-value">${player.block || player.Block || 0}</div>
        </div>
      `;

      detailCard.classList.add('visible');

      setTimeout(() => {
        renderRadarChart(player);
      }, 100);
    }

    function renderRadarChart(player) {
      const chartDom = document.getElementById('radarChart');
      if (radarChart) {
        radarChart.dispose();
      }
      radarChart = echarts.init(chartDom);

      const score = player.score || player.Score || 0;
      const rebound = player.rebound || player.Rebound || 0;
      const assist = player.assist || player.Assist || 0;
      const steal = player.steal || player.Steal || 0;
      const block = player.block || player.Block || 0;

      const option = {
        backgroundColor: 'transparent',
        title: {
          text: '球员能力雷达图',
          left: 'center',
          top: 10,
          textStyle: {
            color: '#fff',
            fontSize: 18,
            fontWeight: 600
          }
        },
        tooltip: {
          trigger: 'item',
          backgroundColor: 'rgba(0, 20, 40, 0.95)',
          borderColor: '#00d4ff',
          borderWidth: 1,
          textStyle: {
            color: '#fff'
          }
        },
        radar: {
          indicator: [
            { name: '得分', max: 40 },
            { name: '篮板', max: 15 },
            { name: '助攻', max: 15 },
            { name: '抢断', max: 3 },
            { name: '盖帽', max: 3 }
          ],
          shape: 'polygon',
          splitNumber: 5,
          name: {
            textStyle: {
              color: '#00d4ff',
              fontSize: 14,
              fontWeight: 600
            }
          },
          splitLine: {
            lineStyle: {
              color: 'rgba(255, 255, 255, 0.1)'
            }
          },
          splitArea: {
            show: true,
            areaStyle: {
              color: ['rgba(0, 212, 255, 0.05)', 'rgba(0, 212, 255, 0.1)']
            }
          },
          axisLine: {
            lineStyle: {
              color: 'rgba(255, 255, 255, 0.2)'
            }
          }
        },
        series: [{
          type: 'radar',
          data: [{
            value: [score, rebound, assist, steal, block],
            name: player.playerName || player.PlayerName || '球员',
            symbol: 'circle',
            symbolSize: 8,
            lineStyle: {
              color: '#00d4ff',
              width: 3
            },
            areaStyle: {
              color: new echarts.graphic.RadialGradient(0.5, 0.5, 1, [
                { offset: 0, color: 'rgba(0, 212, 255, 0.8)' },
                { offset: 1, color: 'rgba(0, 212, 255, 0.2)' }
              ])
            },
            itemStyle: {
              color: '#00d4ff',
              borderColor: '#fff',
              borderWidth: 2
            }
          }]
        }]
      };

      radarChart.setOption(option);
      window.addEventListener('resize', () => radarChart.resize());
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const conference = this.dataset.conference;
        renderTeams(conference);
        document.getElementById('teamDetailContainer').classList.remove('visible');
        document.getElementById('placeholder').style.display = 'flex';
      });
    });

    loadData();
  </script>
  <script src="./js/gsap-animations.js"></script>
</body>
</html>
