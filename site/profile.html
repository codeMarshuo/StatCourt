<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>个人中心 · StatCourt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0f1a;
      --bg-secondary: rgba(15, 25, 40, 0.95);
      --bg-card: rgba(20, 35, 55, 0.9);
      --accent: #06b6d4;
      --accent-light: #22d3ee;
      --accent2: #8b5cf6;
      --text-primary: #f0f9ff;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: rgba(148, 163, 184, 0.15);
      --success: #10b981;
      --error: #ef4444;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 100px 24px 40px;
    }
    .page-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .page-title::before {
      content: '';
      width: 4px;
      height: 24px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      border-radius: 2px;
    }
    .profile-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 32px;
      margin-bottom: 24px;
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: white;
    }
    .profile-info h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .profile-info p {
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .form-section {
      margin-bottom: 24px;
    }
    .form-section h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group input,
    .form-group select {
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
    }
    .form-group input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn {
      padding: 12px 24px;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-primary:hover {
      filter: brightness(1.1);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .password-section {
      background: rgba(0, 0, 0, 0.2);
      padding: 24px;
      border: 1px solid var(--border);
    }
    .password-section h3 {
      margin-bottom: 16px;
      margin-top: 0;
    }
    .message {
      padding: 12px 16px;
      border-radius: 0;
      margin-bottom: 16px;
      font-size: 0.85rem;
      display: none;
    }
    .message.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }
    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
    }
    .message.show {
      display: block;
    }
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(16, 185, 129, 0.95);
      color: white;
      padding: 14px 28px;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toast.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }
    .toast-icon {
      font-size: 1.2rem;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      padding: 20px;
      text-align: center;
    }
    .stat-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-light);
    }
    .stat-card .label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .not-logged-in {
      text-align: center;
      padding: 80px 20px;
    }
    .not-logged-in h2 {
      margin-bottom: 12px;
    }
    .not-logged-in p {
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .favorites-preview {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }
    .favorite-item {
      flex: 1;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      text-align: center;
    }
    .favorite-item .icon {
      font-size: 1.5rem;
      margin-bottom: 6px;
    }
    .favorite-item .name {
      font-size: 0.85rem;
      color: var(--text-primary);
      font-weight: 500;
    }
    .favorite-item .type {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .profile-header { flex-direction: column; text-align: center; }
      .favorites-preview { flex-direction: column; }
    }
  </style>
</head>
<body>
  <script src="./js/nav.js"></script>

  <div class="container">
    <div id="toast" class="toast">
      <span class="toast-icon">✓</span>
      <span id="toastText">保存成功</span>
    </div>
    <div id="notLoggedIn" class="not-logged-in" style="display:none;">
      <h2>请先登录</h2>
      <p>登录后查看个人中心</p>
      <a href="./login.html" class="btn btn-primary">去登录</a>
    </div>

    <div id="profileContent" style="display:none;">
      <h1 class="page-title">个人中心</h1>
      
      <div id="message" class="message"></div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="value" id="statDays">0</div>
          <div class="label">注册天数</div>
        </div>
        <div class="stat-card">
          <div class="value" id="statViews">0</div>
          <div class="label">浏览次数</div>
        </div>
        <div class="stat-card">
          <div class="value" id="statFavorites">0</div>
          <div class="label">收藏数量</div>
        </div>
        <div class="stat-card">
          <div class="value" id="statPredictions">0</div>
          <div class="label">预测次数</div>
        </div>
      </div>

      <div class="profile-card">
        <div class="profile-header">
          <div class="avatar" id="avatarInitial">U</div>
          <div class="profile-info">
            <h2 id="profileName">-</h2>
            <p id="profileUsername">@username</p>
          </div>
        </div>

        <div class="form-section">
          <h3>基本信息</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>用户名</label>
              <input type="text" id="username" disabled>
            </div>
            <div class="form-group">
              <label>昵称</label>
              <input type="text" id="name" placeholder="请输入昵称">
            </div>
            <div class="form-group">
              <label>性别</label>
              <select id="gender">
                <option value="1">男</option>
                <option value="2">女</option>
              </select>
            </div>
            <div class="form-group">
              <label>手机号</label>
              <input type="tel" id="phone" placeholder="请输入手机号">
            </div>
          </div>
          <div class="btn-group">
            <button class="btn btn-primary" onclick="updateProfile()">保存修改</button>
          </div>
        </div>
      </div>

      <div class="profile-card">
        <div class="form-section" style="margin-bottom: 0;">
          <h3>我的喜好</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>喜欢的球队</label>
              <select id="favoriteTeam">
                <option value="">请选择球队</option>
              </select>
            </div>
            <div class="form-group">
              <label>喜欢的球员</label>
              <select id="favoritePlayer">
                <option value="">请选择球员</option>
              </select>
            </div>
          </div>
          <div class="favorites-preview" id="favoritesPreview" style="display:none;">
            <div class="favorite-item">
              <div class="icon">🏀</div>
              <div class="name" id="previewTeam">-</div>
              <div class="type">我的球队</div>
            </div>
            <div class="favorite-item">
              <div class="icon">⭐</div>
              <div class="name" id="previewPlayer">-</div>
              <div class="type">我的球员</div>
            </div>
          </div>
          <div class="btn-group">
            <button class="btn btn-primary" onclick="updateFavorites()">保存喜好</button>
          </div>
        </div>
      </div>

      <div class="profile-card">
        <div class="password-section">
          <h3>修改密码</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>原密码</label>
              <input type="password" id="oldPassword" placeholder="请输入原密码">
            </div>
            <div class="form-group">
              <label>新密码</label>
              <input type="password" id="newPassword" placeholder="请输入新密码（至少6位）">
            </div>
          </div>
          <div class="btn-group">
            <button class="btn btn-secondary" onclick="updatePassword()">修改密码</button>
          </div>
        </div>
      </div>

      <div class="profile-card">
        <div class="form-section" style="margin-bottom: 0;">
          <h3>账号操作</h3>
          <div class="btn-group">
            <button class="btn btn-secondary" onclick="logout()">退出登录</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <script>
    let allTeams = [];
    let allPlayers = [];
    
    function getToken() {
      return localStorage.getItem('token');
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type + ' show';
      setTimeout(() => msg.classList.remove('show'), 3000);
    }

    function showToast(text) {
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toastText');
      toastText.textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function calculateDays(createTime) {
      if (!createTime) return 0;
      const created = new Date(createTime);
      const now = new Date();
      return Math.floor((now - created) / (1000 * 60 * 60 * 24));
    }

    async function loadTeamsAndPlayers() {
      try {
        const [teamsRes, playersRes] = await Promise.all([
          axios.get(`${window.API_BASE_URL}/api/teams`),
          axios.get(`${window.API_BASE_URL}/api/players`)
        ]);
        
        if (teamsRes.data.code === 200 || teamsRes.data.code === 0) {
          allTeams = teamsRes.data.data || [];
          const teamSelect = document.getElementById('favoriteTeam');
          allTeams.forEach(team => {
            const opt = document.createElement('option');
            const teamName = team.teamname || team.Team || team.teamName || team;
            opt.value = teamName;
            opt.textContent = teamName;
            teamSelect.appendChild(opt);
          });
        }
        
        if (playersRes.data.code === 200 || playersRes.data.code === 0) {
          allPlayers = playersRes.data.data || [];
          const playerSelect = document.getElementById('favoritePlayer');
          const uniquePlayers = [...new Map(allPlayers.map(p => [p.playerName || p.name, p])).values()];
          uniquePlayers.slice(0, 200).forEach(player => {
            const opt = document.createElement('option');
            const playerName = player.playerName || player.name;
            const teamName = player.team || player.Team || '-';
            opt.value = playerName;
            opt.textContent = `${playerName} (${teamName})`;
            playerSelect.appendChild(opt);
          });
        }
      } catch (e) {
        console.error('加载球队和球员失败', e);
      }
    }

    async function loadProfile() {
      const token = getToken();
      if (!token) {
        document.getElementById('notLoggedIn').style.display = 'block';
        document.getElementById('profileContent').style.display = 'none';
        return;
      }

      try {
        const res = await axios.get(`${window.API_BASE_URL}/api/user/info`, {
          headers: { 'Authorization': token }
        });

        if (res.data.code === 200 && res.data.data) {
          const user = res.data.data;
          
          document.getElementById('notLoggedIn').style.display = 'none';
          document.getElementById('profileContent').style.display = 'block';
          
          document.getElementById('username').value = user.username;
          document.getElementById('name').value = user.name || '';
          document.getElementById('gender').value = user.gender || 1;
          document.getElementById('phone').value = user.phone || '';
          document.getElementById('profileName').textContent = user.name || user.username;
          document.getElementById('profileUsername').textContent = '@' + user.username;
          document.getElementById('avatarInitial').textContent = (user.name || user.username).charAt(0).toUpperCase();
          
          document.getElementById('statDays').textContent = calculateDays(user.createTime);
          document.getElementById('statViews').textContent = user.viewCount || 0;
          document.getElementById('statFavorites').textContent = user.favoriteCount || 0;
          document.getElementById('statPredictions').textContent = user.predictionCount || 0;
          
          if (user.favoriteTeam) {
            document.getElementById('favoriteTeam').value = user.favoriteTeam;
          }
          if (user.favoritePlayer) {
            document.getElementById('favoritePlayer').value = user.favoritePlayer;
          }
          
          updateFavoritesPreview();
        } else {
          localStorage.removeItem('token');
          document.getElementById('notLoggedIn').style.display = 'block';
          document.getElementById('profileContent').style.display = 'none';
        }
      } catch (e) {
        console.error(e);
        localStorage.removeItem('token');
        document.getElementById('notLoggedIn').style.display = 'block';
        document.getElementById('profileContent').style.display = 'none';
      }
    }

    function updateFavoritesPreview() {
      const team = document.getElementById('favoriteTeam').value;
      const player = document.getElementById('favoritePlayer').value;
      const preview = document.getElementById('favoritesPreview');
      
      if (team || player) {
        preview.style.display = 'flex';
        document.getElementById('previewTeam').textContent = team || '未设置';
        document.getElementById('previewPlayer').textContent = player || '未设置';
      } else {
        preview.style.display = 'none';
      }
    }

    document.getElementById('favoriteTeam')?.addEventListener('change', updateFavoritesPreview);
    document.getElementById('favoritePlayer')?.addEventListener('change', updateFavoritesPreview);

    async function updateProfile() {
      const token = getToken();
      if (!token) return;

      const data = {
        name: document.getElementById('name').value,
        gender: parseInt(document.getElementById('gender').value),
        phone: document.getElementById('phone').value
      };

      try {
        const res = await axios.post(`${window.API_BASE_URL}/api/user/update`, data, {
          headers: { 'Authorization': token }
        });

        if (res.data.code === 200) {
          showToast('个人信息保存成功');
          localStorage.setItem('username', data.name);
          document.getElementById('profileName').textContent = data.name;
          document.getElementById('avatarInitial').textContent = (data.name || 'U').charAt(0).toUpperCase();
        } else {
          showMessage(res.data.message || '保存失败', 'error');
        }
      } catch (e) {
        showMessage('网络错误', 'error');
      }
    }

    async function updateFavorites() {
      const token = getToken();
      if (!token) return;

      const data = {
        favoriteTeam: document.getElementById('favoriteTeam').value,
        favoritePlayer: document.getElementById('favoritePlayer').value
      };

      try {
        const res = await axios.post(`${window.API_BASE_URL}/api/user/favorites`, data, {
          headers: { 'Authorization': token }
        });

        if (res.data.code === 200) {
          showToast('喜好保存成功！首页将显示您的选择');
          localStorage.setItem('favoriteTeam', data.favoriteTeam);
          localStorage.setItem('favoritePlayer', data.favoritePlayer);
          updateFavoritesPreview();
        } else {
          showMessage(res.data.message || '保存失败', 'error');
        }
      } catch (e) {
        showMessage('网络错误', 'error');
      }
    }

    async function updatePassword() {
      const token = getToken();
      if (!token) return;

      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;

      if (!oldPassword || !newPassword) {
        showMessage('请填写完整', 'error');
        return;
      }

      if (newPassword.length < 6) {
        showMessage('新密码至少6位', 'error');
        return;
      }

      try {
        const res = await axios.post(`${window.API_BASE_URL}/api/user/password`, {
          oldPassword,
          newPassword
        }, {
          headers: { 'Authorization': token }
        });

        if (res.data.code === 200) {
          showToast('密码修改成功');
          document.getElementById('oldPassword').value = '';
          document.getElementById('newPassword').value = '';
        } else {
          showMessage(res.data.message || '修改失败', 'error');
        }
      } catch (e) {
        showMessage('网络错误', 'error');
      }
    }

    function logout() {
      const token = getToken();
      if (token) {
        axios.post(`${window.API_BASE_URL}/api/logout`, {}, {
          headers: { 'Authorization': token }
        }).catch(() => {});
      }
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      localStorage.removeItem('favoriteTeam');
      localStorage.removeItem('favoritePlayer');
      window.location.href = './login.html';
    }

    async function init() {
      await loadTeamsAndPlayers();
      await loadProfile();
    }

    init();
  </script>
</body>
</html>
