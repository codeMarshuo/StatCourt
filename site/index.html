  <script>
    // Generate dots based on total slides
    const totalSlides = document.querySelectorAll('.carousel-slide').length;
    const dotsContainer = document.querySelector('.carousel-dots');
    for (let i = 0; i < totalSlides; i++) {
      const dot = document.createElement('button');
      dot.className = i === 0 ? 'dot active' : 'dot';
      dot.dataset.slide = i;
      dot.setAttribute('aria-label', `幻灯片 ${i + 1}`);
      dotsContainer.appendChild(dot);
    }

    let currentSlide = 0;
    const slides = document.querySelectorAll('.carousel-slide');
    const dots = document.querySelectorAll('.carousel-dots .dot');
    const carousel = document.querySelector('.carousel-track');

    function showSlide(n) {
      n = (n + totalSlides) % totalSlides;
      currentSlide = n;
      carousel.style.transform = `translateX(${-n * 100}%)`;
      dots.forEach((dot, idx) => {
        dot.classList.toggle('active', idx === n);
      });
    }

    function nextSlide() {
      showSlide(currentSlide + 1);
      resetAutoplay();
    }

    function prevSlide() {
      showSlide(currentSlide - 1);
      resetAutoplay();
    }

    function goToSlide(n) {
      showSlide(n);
      resetAutoplay();
    }

    function startAutoplay() {
      autoplayInterval = setInterval(() => {
        showSlide(currentSlide + 1);
      }, 3000);
    }

    function resetAutoplay() {
      clearInterval(autoplayInterval);
      startAutoplay();
    }

    // Event listeners
    document.querySelector('.carousel-next').addEventListener('click', nextSlide);
    document.querySelector('.carousel-prev').addEventListener('click', prevSlide);
    dots.forEach(dot => {
      dot.addEventListener('click', () => goToSlide(parseInt(dot.dataset.slide)));
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') prevSlide();
      if (e.key === 'ArrowRight') nextSlide();
    });

    // Start autoplay
    let autoplayInterval;
    startAutoplay();
  </script>

      '萨克拉门托 国王': './assets/全新NBA球队logo/国王.PNG',
      '圣安东尼奥 马刺': './assets/全新NBA球队logo/马刺.PNG',
      '多伦多 猛龙': './assets/全新NBA球队logo/猛龙.PNG',
      '犹他 爵士': './assets/全新NBA球队logo/爵士.PNG',
      '华盛顿 奇才': './assets/全新NBA球队logo/奇才.PNG',
      '夏洛特 黄蜂': './assets/全新NBA球队logo/黄蜂.PNG'
    };

    function initSidebars() {
      const sidebarLeft = document.getElementById('sidebarLeft');
      const sidebarRight = document.getElementById('sidebarRight');
    }

    async function loadFavorites() {
      const token = localStorage.getItem('token');
      if (!token) {
        document.getElementById('sidebarLeft').style.display = 'none';
        document.getElementById('sidebarRight').style.display = 'none';
        return;
      }

      try {
        const res = await axios.get(`${window.API_BASE_URL}/api/user/info`, {
          headers: { 'Authorization': token }
        });

        if (res.data.code === 200 && res.data.data) {
          const user = res.data.data;
          const favoriteTeam = user.favoriteTeam;
          const favoritePlayer = user.favoritePlayer;

          if (favoriteTeam) {
            document.getElementById('sidebarLeft').style.display = 'block';
            document.getElementById('favTeamName').textContent = favoriteTeam;
            document.getElementById('favTeamLogo').src = logoMap[favoriteTeam] || '';
            
            let teamQueryName = favoriteTeam;
            const teamNameParts = favoriteTeam.split(' ');
            if (teamNameParts.length > 1) {
              teamQueryName = teamNameParts[teamNameParts.length - 1];
            }
            
            const top3Res = await axios.get(`${window.API_BASE_URL}/api/team/top3/${encodeURIComponent(teamQueryName)}`);
            if (top3Res.data.code === 200 && top3Res.data.data) {
              const players = top3Res.data.data;
              const playersList = document.getElementById('favPlayersList');
              playersList.innerHTML = players.map((p, i) => {
                const playerName = p.playerName || p.PlayerName;
                const playerImg = p.playerImage || p.PlayerImage || '';
                const score = (p.score || p.Score || 0).toFixed(1);
                const initial = playerName ? playerName.charAt(0).toUpperCase() : '?';
                
                return `
                  <div class="player-item">
                    <div class="player-item-avatar">
                      ${playerImg ? `<img src="${playerImg}" alt="${playerName}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="avatar-fallback" style="display:none">${initial}</div>` : `<div class="avatar-fallback">${initial}</div>`}
                    </div>
                    <div class="player-item-info">
                      <div class="player-name">${playerName}</div>
                      <div class="player-pts">${score} 分</div>
                    </div>
                  </div>
                `;
              }).join('');
            }
          }

          if (favoritePlayer) {
            document.getElementById('sidebarRight').style.display = 'block';
            document.getElementById('favPlayerName').textContent = favoritePlayer;
            document.getElementById('playerInitial').textContent = favoritePlayer.charAt(0).toUpperCase();
            
            const playersRes = await axios.get(`${window.API_BASE_URL}/api/players`);
            if (playersRes.data.code === 200 && playersRes.data.data) {
              const player = playersRes.data.data.find(p => 
                (p.playerName || p.PlayerName) === favoritePlayer
              );
              
              if (player) {
                const playerImg = player.playerImage || player.PlayerImage || '';
                const playerImgEl = document.getElementById('favPlayerImg');
                const fallbackEl = document.getElementById('favPlayerFallback');
                
                if (playerImg) {
                  playerImgEl.src = playerImg;
                  playerImgEl.onload = () => {
                    playerImgEl.classList.add('loaded');
                    fallbackEl.classList.add('hidden');
                  };
                  playerImgEl.onerror = () => {
                    playerImgEl.classList.remove('loaded');
                    fallbackEl.classList.remove('hidden');
                  };
                }
                
                document.getElementById('favPlayerTeam').textContent = player.team || player.Team || '-';
                document.getElementById('playerPts').textContent = (player.score || player.Score || 0).toFixed(1);
                document.getElementById('playerReb').textContent = (player.rebound || player.Rebound || 0).toFixed(1);
                document.getElementById('playerAst').textContent = (player.assist || player.Assist || 0).toFixed(1);
              }
            }
          }
        }
      } catch (e) {
        console.error('加载喜好数据失败', e);
      }
    }

    initSidebars();
    loadFavorites();
  </script>
</body>
</html>
