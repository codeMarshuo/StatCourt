<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>数据可视化 · StatCourt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a1929 0%, #1a2027 50%, #0d1b2a 100%);
      color: #eaf6fb;
      min-height: 100vh;
      line-height: 1.6;
    }

    .section {
      padding: 100px 0 40px;
      min-height: 100vh;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .page-title {
      font-size: 2.5rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .page-subtitle {
      font-size: 1rem;
      color: #9bd1e3;
    }

    .section-divider {
      margin: 3rem 0;
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
    }

    .section-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 1.5rem;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .section-title::before,
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.5));
    }

    .section-title::after {
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.5), transparent);
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .chart-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .chart-card.full-width {
      grid-column: 1 / -1;
    }

    .chart-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .chart-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(180deg, #00d4ff, #3bc9ff);
      border-radius: 2px;
    }

    .chart-container {
      width: 100%;
      height: 400px;
    }

    .chart-container.large {
      height: 500px;
    }

    .team-radar-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .team-radar-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .team-radar-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0, 212, 255, 0.3);
      box-shadow: 0 8px 30px rgba(0, 212, 255, 0.15);
    }

    .team-radar-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .team-logo-small {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.1);
      padding: 2px;
    }

    .team-info-small {
      flex: 1;
    }

    .team-name-small {
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-record-small {
      font-size: 0.65rem;
      color: #9bd1e3;
    }

    .team-radar-chart {
      width: 100%;
      height: 180px;
    }

    .team-stats-mini {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.25rem;
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .stat-mini {
      text-align: center;
    }

    .stat-mini-value {
      font-size: 0.75rem;
      font-weight: 600;
      color: #00d4ff;
    }

    .stat-mini-label {
      font-size: 0.55rem;
      color: #64748b;
      text-transform: uppercase;
    }

    .conference-section {
      margin-bottom: 2rem;
    }

    .conference-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #00d4ff;
      margin-bottom: 1rem;
      padding-left: 0.75rem;
      border-left: 3px solid #00d4ff;
    }

    .footer {
      background: rgba(10, 25, 41, 0.8);
      backdrop-filter: blur(20px);
      padding: 2rem 0;
      text-align: center;
      color: #9bd1e3;
      font-size: 0.875rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 1400px) {
      .team-radar-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    @media (max-width: 1200px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }

      .team-radar-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 900px) {
      .team-radar-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 768px) {
      .page-title {
        font-size: 2rem;
      }

      .chart-container {
        height: 300px;
      }

      .chart-container.large {
        height: 400px;
      }

      .team-radar-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .team-radar-chart {
        height: 120px;
      }
    }

    @media (max-width: 480px) {
      .team-radar-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <script src="./js/nav.js"></script>

  <section class="section">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">NBA 数据可视化</h1>
        <p class="page-subtitle">2025-2026赛季 · 多维度数据分析</p>
      </div>

      <div class="charts-grid">
        <div class="chart-card full-width">
          <h3 class="chart-title">球员得分排行榜 TOP 20</h3>
          <div id="scoreRankChart" class="chart-container large"></div>
        </div>

        <div class="chart-card">
          <h3 class="chart-title">球队胜率分布</h3>
          <div id="teamWinRateChart" class="chart-container"></div>
        </div>

        <div class="chart-card">
          <h3 class="chart-title">球队场均得分对比</h3>
          <div id="teamScoreChart" class="chart-container"></div>
        </div>

        <div class="chart-card full-width">
          <h3 class="chart-title">三分球数据散点图（命中数>50）</h3>
          <div id="threePointChart" class="chart-container large"></div>
        </div>

        <div class="chart-card">
          <h3 class="chart-title">球员篮板助攻对比 TOP 15</h3>
          <div id="reboundAssistChart" class="chart-container"></div>
        </div>

        <div class="chart-card">
          <h3 class="chart-title">球队数据雷达图 TOP 5</h3>
          <div id="teamRadarChart" class="chart-container"></div>
        </div>
      </div>

      <hr class="section-divider">

      <h2 class="section-title">球队综合能力雷达图</h2>

      <div class="conference-section">
        <div class="conference-title">东部联盟</div>
        <div class="team-radar-grid" id="eastTeamRadarGrid"></div>
      </div>

      <div class="conference-section">
        <div class="conference-title">西部联盟</div>
        <div class="team-radar-grid" id="westTeamRadarGrid"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>Copyright ©2026 All rights reserved | StatCourt · NBA数据球场</p>
    </div>
  </footer>

  <script>
    let nbaData = {};
    let teamRadarCharts = [];

    const TEAM_COLORS = {
      'ATL': '#E03A3E',
      'BOS': '#007A33',
      'BKN': '#000000',
      'CHA': '#1D1160',
      'CHI': '#CE1141',
      'CLE': '#860038',
      'DAL': '#00538C',
      'DEN': '#0E2240',
      'DET': '#C8102E',
      'GSW': '#1D428A',
      'HOU': '#CE1141',
      'IND': '#002D62',
      'LAC': '#C8102E',
      'LAL': '#552583',
      'MEM': '#5D76A9',
      'MIA': '#98002E',
      'MIL': '#00471B',
      'MIN': '#0C2340',
      'NOP': '#0C2340',
      'NYK': '#F58426',
      'OKC': '#007AC1',
      'ORL': '#0077C0',
      'PHI': '#006BB6',
      'PHX': '#1D1160',
      'POR': '#E03A3E',
      'SAC': '#5A2D81',
      'SAS': '#C4CED4',
      'TOR': '#CE1141',
      'UTA': '#002B5C',
      'WAS': '#002B5C'
    };

    const EAST_TEAMS = ['BOS', 'BKN', 'NYK', 'PHI', 'TOR', 'CHI', 'CLE', 'DET', 'IND', 'MIL', 'ATL', 'CHA', 'MIA', 'ORL', 'WAS'];
    const WEST_TEAMS = ['DEN', 'MIN', 'OKC', 'POR', 'UTA', 'GSW', 'LAC', 'LAL', 'PHX', 'SAC', 'DAL', 'HOU', 'MEM', 'NOP', 'SAS'];

    async function loadData() {
      try {
        const response = await axios({
          method: 'GET',
          url: `${API_BASE_URL}/api/data`,
          headers: { 'Content-Type': 'application/json' }
        });

        const res = response.data;
        if (res && (res.code === 200 || res.code === 0)) {
          nbaData = res.data || {};
          initAllCharts();
          initTeamRadarGrids();
        }
      } catch (error) {
        console.error('加载数据失败:', error);
      }
    }

    function initAllCharts() {
      initScoreRankChart();
      initTeamWinRateChart();
      initTeamScoreChart();
      initThreePointChart();
      initReboundAssistChart();
      initTeamRadarChart();
    }

    function initScoreRankChart() {
      const chart = echarts.init(document.getElementById('scoreRankChart'));
      
      if (!nbaData.players || nbaData.players.length === 0) return;

      const sorted = [...nbaData.players]
        .sort((a, b) => (b.score || b.Score || 0) - (a.score || a.Score || 0))
        .slice(0, 20)
        .reverse();

      const names = sorted.map(p => p.playerName || p.PlayerName || '未知');
      const scores = sorted.map(p => p.score || p.Score || 0);

      const option = {
        backgroundColor: 'transparent',
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          backgroundColor: 'rgba(0, 20, 40, 0.95)',
          borderColor: '#00d4ff',
          borderWidth: 1,
          textStyle: { color: '#fff' }
        },
        grid: {
          left: '3%',
          right: '8%',
          bottom: '3%',
          top: '3%',
          containLabel: true
        },
        xAxis: {
          type: 'value',
          name: '得分',
          nameTextStyle: { color: '#9bd1e3' },
          axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.3)' } },
          axisLabel: { color: '#bcd3df' },
          splitLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } }
        },
        yAxis: {
          type: 'category',
          data: names,
          axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.3)' } },
          axisLabel: { color: '#bcd3df', fontSize: 12 }
        },
        series: [{
          type: 'bar',
          data: scores,
          itemStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
              { offset: 0, color: '#00d4ff' },
              { offset: 1, color: '#3bc9ff' }
            ]),
            borderRadius: [0, 4, 4, 0]
          },
          emphasis: {
            itemStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                { offset: 0, color: '#3bc9ff' },
                { offset: 1, color: '#00d4ff' }
              ])
            }
          },
          label: {
            show: true,
            position: 'right',
            color: '#00d4ff',
            fontWeight: 600
          }
        }]
      };

      chart.setOption(option);
      window.addEventListener('resize', () => chart.resize());
    }

    function initTeamWinRateChart() {
      const chart = echarts.init(document.getElementById('teamWinRateChart'));
      
      if (!nbaData.teams || nbaData.teams.length === 0) return;

      const top10 = [...nbaData.teams]
        .sort((a, b) => {
          const winA = parseFloat((a.winper || a.Winper || '0%').replace('%', ''));
          const winB = parseFloat((b.winper || b.Winper || '0%').replace('%', ''));
          return winB - winA;
        })
        .slice(0, 10);

      const data = top10.map(t => ({
        name: (t.team || t.Team || '未知').split(' ').pop(),
        value: parseFloat((t.winper || t.Winper || '0%').replace('%', ''))
      }));

      const option = {
        backgroundColor: 'transparent',
        tooltip: {
          trigger: 'item',
          formatter: '{b}: {c}%',
          backgroundColor: 'rgba(0, 20, 40, 0.95)',
          borderColor: '#00d4ff',
          borderWidth: 1,
          textStyle: { color: '#fff' }
        },
        legend: {
          orient: 'vertical',
          right: 10,
          top: 'center',
          textStyle: { color: '#bcd3df', fontSize: 11 }
        },
        series: [{
          type: 'pie',
          radius: ['40%', '70%'],
          center: ['40%', '50%'],
          avoidLabelOverlap: false,
          itemStyle: {
            borderRadius: 8,
            borderColor: '#0a1929',
            borderWidth: 2
          },
          label: { show: false },
          emphasis: {
            label: {
              show: true,
              fontSize: 14,
              fontWeight: 'bold',
              color: '#fff'
            }
          },
          data: data,
          color: ['#00d4ff', '#3bc9ff', '#5dd3ff', '#7fe0ff', '#a1edff', 
                  '#ff6b6b', '#ff8787', '#ffa3a3', '#ffbfbf', '#ffdbdb']
        }]
      };

      chart.setOption(option);
      window.addEventListener('resize', () => chart.resize());
    }

    function initTeamScoreChart() {
      const chart = echarts.init(document.getElementById('teamScoreChart'));
      
      if (!nbaData.teams || nbaData.teams.length === 0) return;

      const sorted = [...nbaData.teams]
        .sort((a, b) => (b.Score || b.score || 0) - (a.Score || a.score || 0))
        .slice(0, 10);

      const names = sorted.map(t => (t.team || t.Team || '未知').split(' ').pop());
      const scores = sorted.map(t => t.Score || t.score || 0);

      const option = {
        backgroundColor: 'transparent',
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          backgroundColor: 'rgba(0, 20, 40, 0.95)',
          borderColor: '#00d4ff',
          borderWidth: 1,
          textStyle: { color: '#fff' }
        },
        grid: {
          left: '3%',
          right: '4%',
          bottom: '15%',
          top: '10%',
          containLabel: true
        },
        xAxis: {
          type: 'category',
          data: names,
          axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.3)' } },
          axisLabel: { color: '#bcd3df', rotate: 30, fontSize: 11 }
        },
        yAxis: {
          type: 'value',
          name: '场均得分',
          nameTextStyle: { color: '#9bd1e3' },
          axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.3)' } },
          axisLabel: { color: '#bcd3df' },
          splitLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } }
        },
        series: [{
          type: 'bar',
          data: scores,
          itemStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: '#ff6b6b' },
              { offset: 1, color: '#ff8787' }
            ]),
            borderRadius: [4, 4, 0, 0]
          },
          label: {
            show: true,
            position: 'top',
            color: '#ff6b6b',
            fontWeight: 600,
            fontSize: 11
          }
        }]
      };

      chart.setOption(option);
      window.addEventListener('resize', () => chart.resize());
    }

    function initThreePointChart() {
      const chart = echarts.init(document.getElementById('threePointChart'));
      
      if (!nbaData.players || nbaData.players.length === 0) return;

      const players = nbaData.players.filter(p => {
        const made = parseInt(p.threePointFieldGoals || p.ThreePointFieldGoals) || 0;
        const pctStr = p.threePointShootingPer || p.ThreePointShootingPer || '0%';
        const pct = parseFloat(pctStr.replace('%', '')) || 0;
        return made > 50 && pct > 0;
      });

      if (players.length === 0) return;

      const maxMade = Math.max(...players.map(p => parseInt(p.threePointFieldGoals || p.ThreePointFieldGoals) || 0));
      const maxPct = Math.min(60, Math.max(...players.map(p => {
        const pctStr = p.threePointShootingPer || p.ThreePointShootingPer || '0%';
        return parseFloat(pctStr.replace('%', '')) || 0;
      })));

      const maxMadePlayer = players.find(p => parseInt(p.threePointFieldGoals || p.ThreePointFieldGoals) === maxMade);
      const maxPctPlayer = players.find(p => {
        const pctStr = p.threePointShootingPer || p.ThreePointShootingPer || '0%';
        return parseFloat(pctStr.replace('%', '')) === maxPct;
      });

      const normalData = [];
      const rippleData = [];

      players.forEach(player => {
        const made = parseInt(player.threePointFieldGoals || player.ThreePointFieldGoals) || 0;
        const pctStr = player.threePointShootingPer || player.ThreePointShootingPer || '0%';
        const pct = parseFloat(pctStr.replace('%', '')) || 0;
        const name = player.playerName || player.PlayerName || '未知';
        const team = player.team || player.Team || '';
        const image = player.playerImage || player.PlayerImage || '';
        
        const dataPoint = {
          value: [made, pct],
          name: name,
          team: team,
          image: image,
          made: made,
          pct: pct
        };

        if (player === maxMadePlayer || player === maxPctPlayer) {
          rippleData.push(dataPoint);
        } else {
          normalData.push(dataPoint);
        }
      });

      const madeInterval = Math.ceil(maxMade / 10 / 10) * 10;
      const pctInterval = Math.ceil(maxPct / 10);

      const option = {
        backgroundColor: 'transparent',
        title: {
          text: '三分球产量与效率分析',
          subtext: `共筛选出 ${players.length} 名球员（三分命中数>50）`,
          left: 'center',
          top: 10,
          textStyle: { color: '#fff', fontSize: 18, fontWeight: 600 },
          subtextStyle: { color: '#9bd1e3', fontSize: 13 }
        },
        tooltip: {
          trigger: 'item',
          formatter: function(params) {
            const d = params.data;
            const isTop = params.seriesName === '最高产量/命中率球员';
            const star = isTop ? '⭐ ' : '';
            const imgHtml = d.image ? `<img src="${d.image}" style="width:60px;height:45px;border-radius:8px;object-fit:cover;margin-bottom:8px;border:2px solid #00d4ff;" onerror="this.style.display='none'"/>` : '';
            return `<div style="text-align:center;">
              ${imgHtml}
              <div style="font-weight:600;font-size:14px;margin-bottom:4px;">${star}${d.name}</div>
              <div style="color:#9bd1e3;font-size:12px;">${d.team}</div>
              <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,212,255,0.3);">
                <span style="color:#00d4ff;">三分命中:</span> <b>${d.made}</b> 个<br/>
                <span style="color:#00d4ff;">命中率:</span> <b>${d.pct}%</b>
              </div>
            </div>`;
          },
          backgroundColor: 'rgba(10, 25, 41, 0.95)',
          borderColor: '#00d4ff',
          borderWidth: 2,
          textStyle: { color: '#fff', fontSize: 14 },
          padding: [12, 16],
          extraCssText: 'box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);border-radius:12px;'
        },
        legend: {
          data: ['普通球员', '最高产量/命中率球员'],
          bottom: 10,
          textStyle: { color: '#bcd3df', fontSize: 12 }
        },
        grid: {
          left: '6%',
          right: '6%',
          bottom: '15%',
          top: '18%',
          containLabel: true
        },
        xAxis: {
          type: 'value',
          name: '三分命中数',
          nameLocation: 'middle',
          nameGap: 40,
          nameTextStyle: { color: '#00d4ff', fontSize: 15, fontWeight: 600 },
          min: 0,
          max: Math.ceil(maxMade / madeInterval) * madeInterval + madeInterval,
          interval: madeInterval,
          splitLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.08)' } },
          axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.3)' } },
          axisLabel: { color: '#bcd3df', fontSize: 12 }
        },
        yAxis: {
          type: 'value',
          name: '三分命中率 (%)',
          nameLocation: 'middle',
          nameGap: 55,
          nameTextStyle: { color: '#00d4ff', fontSize: 15, fontWeight: 600 },
          min: 0,
          max: Math.ceil(maxPct / pctInterval) * pctInterval + pctInterval,
          interval: pctInterval,
          splitLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.08)' } },
          axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.3)' } },
          axisLabel: { color: '#bcd3df', fontSize: 12, formatter: '{value}%' }
        },
        series: [
          {
            name: '普通球员',
            type: 'scatter',
            symbolSize: function(val, params) {
              return Math.sqrt(params.data.made) * 1.5 + 8;
            },
            data: normalData,
            itemStyle: {
              color: new echarts.graphic.RadialGradient(0.5, 0.5, 1, [
                { offset: 0, color: '#00d4ff' },
                { offset: 1, color: 'rgba(0, 212, 255, 0.3)' }
              ]),
              shadowBlur: 15,
              shadowColor: 'rgba(0, 212, 255, 0.5)'
            },
            emphasis: {
              itemStyle: {
                color: '#00d4ff',
                shadowBlur: 25,
                shadowColor: 'rgba(0, 212, 255, 0.9)',
                borderColor: '#fff',
                borderWidth: 2
              },
              scale: 1.5
            }
          },
          {
            name: '最高产量/命中率球员',
            type: 'effectScatter',
            symbolSize: function(val, params) {
              return Math.sqrt(params.data.made) * 1.5 + 12;
            },
            data: rippleData,
            rippleEffect: {
              brushType: 'stroke',
              scale: 5,
              period: 3
            },
            itemStyle: {
              color: new echarts.graphic.RadialGradient(0.5, 0.5, 1, [
                { offset: 0, color: '#ff6b6b' },
                { offset: 1, color: 'rgba(255, 107, 107, 0.3)' }
              ]),
              shadowBlur: 25,
              shadowColor: 'rgba(255, 107, 107, 0.9)'
            },
            emphasis: {
              itemStyle: {
                color: '#ff6b6b',
                shadowBlur: 35,
                shadowColor: 'rgba(255, 107, 107, 1)',
                borderColor: '#fff',
                borderWidth: 3
              },
              scale: 1.5
            }
          }
        ]
      };

      chart.setOption(option);
      window.addEventListener('resize', () => chart.resize());
    }

    function initReboundAssistChart() {
      const chart = echarts.init(document.getElementById('reboundAssistChart'));
      
      if (!nbaData.players || nbaData.players.length === 0) return;

      const sorted = [...nbaData.players]
        .sort((a, b) => ((b.rebound || b.Rebound || 0) + (b.assist || b.Assist || 0)) - 
                        ((a.rebound || a.Rebound || 0) + (a.assist || a.Assist || 0)))
        .slice(0, 15);

      const names = sorted.map(p => p.playerName || p.PlayerName || '未知');
      const rebounds = sorted.map(p => p.rebound || p.Rebound || 0);
      const assists = sorted.map(p => p.assist || p.Assist || 0);

      const option = {
        backgroundColor: 'transparent',
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          backgroundColor: 'rgba(0, 20, 40, 0.95)',
          borderColor: '#00d4ff',
          borderWidth: 1,
          textStyle: { color: '#fff' }
        },
        legend: {
          data: ['篮板', '助攻'],
          textStyle: { color: '#bcd3df' },
          top: 10
        },
        grid: {
          left: '3%',
          right: '4%',
          bottom: '15%',
          top: '15%',
          containLabel: true
        },
        xAxis: {
          type: 'category',
          data: names,
          axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.3)' } },
          axisLabel: { color: '#bcd3df', rotate: 30, fontSize: 10 }
        },
        yAxis: {
          type: 'value',
          axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.3)' } },
          axisLabel: { color: '#bcd3df' },
          splitLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } }
        },
        series: [
          {
            name: '篮板',
            type: 'bar',
            data: rebounds,
            itemStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: '#4ade80' },
                { offset: 1, color: '#22c55e' }
              ]),
              borderRadius: [4, 4, 0, 0]
            }
          },
          {
            name: '助攻',
            type: 'bar',
            data: assists,
            itemStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: '#fbbf24' },
                { offset: 1, color: '#f59e0b' }
              ]),
              borderRadius: [4, 4, 0, 0]
            }
          }
        ]
      };

      chart.setOption(option);
      window.addEventListener('resize', () => chart.resize());
    }

    function initTeamRadarChart() {
      const chart = echarts.init(document.getElementById('teamRadarChart'));
      
      if (!nbaData.teams || nbaData.teams.length === 0) return;

      const top5 = [...nbaData.teams]
        .sort((a, b) => {
          const winA = parseFloat((a.winper || a.Winper || '0%').replace('%', ''));
          const winB = parseFloat((b.winper || b.Winper || '0%').replace('%', ''));
          return winB - winA;
        })
        .slice(0, 5);

      const seriesData = top5.map(t => ({
        name: (t.team || t.Team || '未知').split(' ').pop(),
        value: [
          t.Score || t.score || 0,
          t.Rebound || t.rebound || 0,
          t.Assist || t.assist || 0,
          t.Steal || t.steal || 0,
          t.Block || t.block || 0
        ]
      }));

      const option = {
        backgroundColor: 'transparent',
        title: {
          text: '球队综合能力对比',
          left: 'center',
          top: 10,
          textStyle: { color: '#fff', fontSize: 16, fontWeight: 600 }
        },
        tooltip: {
          trigger: 'item',
          backgroundColor: 'rgba(0, 20, 40, 0.95)',
          borderColor: '#00d4ff',
          borderWidth: 1,
          textStyle: { color: '#fff' }
        },
        legend: {
          data: seriesData.map(d => d.name),
          bottom: 10,
          textStyle: { color: '#bcd3df', fontSize: 11 }
        },
        radar: {
          indicator: [
            { name: '得分', max: 130 },
            { name: '篮板', max: 55 },
            { name: '助攻', max: 30 },
            { name: '抢断', max: 12 },
            { name: '盖帽', max: 8 }
          ],
          shape: 'polygon',
          splitNumber: 5,
          name: {
            textStyle: { color: '#00d4ff', fontSize: 12, fontWeight: 600 }
          },
          splitLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.1)' } },
          splitArea: {
            show: true,
            areaStyle: { color: ['rgba(0, 212, 255, 0.05)', 'rgba(0, 212, 255, 0.1)'] }
          },
          axisLine: { lineStyle: { color: 'rgba(255, 255, 255, 0.2)' } }
        },
        series: [{
          type: 'radar',
          data: seriesData.map((d, i) => ({
            name: d.name,
            value: d.value,
            symbol: 'circle',
            symbolSize: 6,
            lineStyle: { width: 2 },
            areaStyle: { opacity: 0.3 }
          })),
          color: ['#00d4ff', '#ff6b6b', '#4ade80', '#fbbf24', '#a78bfa']
        }]
      };

      chart.setOption(option);
      window.addEventListener('resize', () => chart.resize());
    }

    function getTeamCode(teamName) {
      if (!teamName) return null;
      const name = teamName.toLowerCase();
      const codeMap = {
        '凯尔特人': 'BOS', 'celtics': 'BOS', 'boston': 'BOS',
        '篮网': 'BKN', 'nets': 'BKN', 'brooklyn': 'BKN',
        '太阳': 'PHX', 'suns': 'PHX', 'phoenix': 'PHX',
        '尼克斯': 'NYK', 'knicks': 'NYK', 'new york': 'NYK',
        '76人': 'PHI', '76ers': 'PHI', 'sixers': 'PHI', 'philadelphia': 'PHI',
        '猛龙': 'TOR', 'raptors': 'TOR', 'toronto': 'TOR',
        '公牛': 'CHI', 'bulls': 'CHI', 'chicago': 'CHI',
        '骑士': 'CLE', 'cavaliers': 'CLE', 'cavs': 'CLE', 'cleveland': 'CLE',
        '活塞': 'DET', 'pistons': 'DET', 'detroit': 'DET',
        '步行者': 'IND', 'pacers': 'IND', 'indiana': 'IND',
        '雄鹿': 'MIL', 'bucks': 'MIL', 'milwaukee': 'MIL',
        '老鹰': 'ATL', 'hawks': 'ATL', 'atlanta': 'ATL',
        '黄蜂': 'CHA', 'hornets': 'CHA', 'charlotte': 'CHA',
        '热火': 'MIA', 'heat': 'MIA', 'miami': 'MIA',
        '魔术': 'ORL', 'magic': 'ORL', 'orlando': 'ORL',
        '奇才': 'WAS', 'wizards': 'WAS', 'washington': 'WAS',
        '掘金': 'DEN', 'nuggets': 'DEN', 'denver': 'DEN',
        '森林狼': 'MIN', 'timberwolves': 'MIN', 'wolves': 'MIN', 'minnesota': 'MIN',
        '雷霆': 'OKC', 'thunder': 'OKC', 'oklahoma': 'OKC',
        '开拓者': 'POR', 'blazers': 'POR', 'portland': 'POR', 'trail blazers': 'POR',
        '爵士': 'UTA', 'jazz': 'UTA', 'utah': 'UTA',
        '勇士': 'GSW', 'warriors': 'GSW', 'golden state': 'GSW',
        '快船': 'LAC', 'clippers': 'LAC', 'la clippers': 'LAC',
        '湖人': 'LAL', 'lakers': 'LAL', 'la lakers': 'LAL', 'los angeles lakers': 'LAL',
        '国王': 'SAC', 'kings': 'SAC', 'sacramento': 'SAC',
        '独行侠': 'DAL', 'mavericks': 'DAL', 'dallas': 'DAL',
        '火箭': 'HOU', 'rockets': 'HOU', 'houston': 'HOU',
        '灰熊': 'MEM', 'grizzlies': 'MEM', 'memphis': 'MEM',
        '鹈鹕': 'NOP', 'pelicans': 'NOP', 'new orleans': 'NOP',
        '马刺': 'SAS', 'spurs': 'SAS', 'san antonio': 'SAS'
      };
      
      for (const [key, code] of Object.entries(codeMap)) {
        if (name.includes(key)) return code;
      }
      return null;
    }

    function createTeamRadarCard(team, container) {
      const teamCode = getTeamCode(team.teamname || team.Team);
      const teamColor = teamCode ? TEAM_COLORS[teamCode] : '#00d4ff';
      
      const card = document.createElement('div');
      card.className = 'team-radar-card';
      
      const teamShortName = (team.teamname || team.Team || '未知').split(' ').pop();
      const wins = team.win || 0;
      const losses = team.lose || 0;
      const winperStr = team.winper || '0%';
      const winrate = parseFloat(winperStr.replace('%', '')) / 100 || 0;
      
      const score = team.score || team.Score || 0;
      const rebound = team.rebound || team.Rebound || 0;
      const assist = team.assist || team.Assist || 0;
      const steal = team.steal || team.Steal || 0;
      const block = team.block || team.Block || 0;
      
      card.innerHTML = `
        <div class="team-radar-header">
          <img class="team-logo-small" src="./assets/teamLogo/${teamCode}_logo.png" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><circle cx=%2220%22 cy=%2220%22 r=%2218%22 fill=%22%23333%22/><text x=%2220%22 y=%2226%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-size=%2212%22>${teamShortName.substring(0,3)}</text></svg>'" alt="${teamShortName}">
          <div class="team-info-small">
            <div class="team-name-small">${teamShortName}</div>
            <div class="team-record-small">${wins}-${losses} (${(winrate * 100).toFixed(1)}%)</div>
          </div>
        </div>
        <div class="team-radar-chart" id="radar-${teamCode || Math.random().toString(36).substr(2, 9)}"></div>
        <div class="team-stats-mini">
          <div class="stat-mini">
            <div class="stat-mini-value">${score.toFixed(1)}</div>
            <div class="stat-mini-label">得分</div>
          </div>
          <div class="stat-mini">
            <div class="stat-mini-value">${rebound.toFixed(1)}</div>
            <div class="stat-mini-label">篮板</div>
          </div>
          <div class="stat-mini">
            <div class="stat-mini-value">${assist.toFixed(1)}</div>
            <div class="stat-mini-label">助攻</div>
          </div>
        </div>
      `;
      
      container.appendChild(card);
      
      const chartDom = card.querySelector('.team-radar-chart');
      const chart = echarts.init(chartDom);
      teamRadarCharts.push(chart);
      
      const option = {
        backgroundColor: 'transparent',
        radar: {
          indicator: [
            { name: '得分', max: 130 },
            { name: '篮板', max: 50 },
            { name: '助攻', max: 35 },
            { name: '抢断', max: 12 },
            { name: '盖帽', max: 8 }
          ],
          shape: 'polygon',
          splitNumber: 5,
          center: ['50%', '55%'],
          radius: '70%',
          name: {
            show: true,
            textStyle: {
              color: '#9bd1e3',
              fontSize: 10,
              fontWeight: 500
            },
            formatter: function(value) {
              return value;
            }
          },
          splitLine: { 
            lineStyle: { 
              color: 'rgba(0, 212, 255, 0.3)',
              width: 1
            }
          },
          splitArea: {
            show: true,
            areaStyle: { 
              color: [
                'rgba(0, 212, 255, 0.02)',
                'rgba(0, 212, 255, 0.05)',
                'rgba(0, 212, 255, 0.08)',
                'rgba(0, 212, 255, 0.11)',
                'rgba(0, 212, 255, 0.14)'
              ]
            }
          },
          axisLine: { 
            lineStyle: { 
              color: 'rgba(0, 212, 255, 0.4)',
              width: 1
            }
          }
        },
        series: [{
          type: 'radar',
          data: [{
            value: [
              score,
              rebound,
              assist,
              steal,
              block
            ],
            symbol: 'circle',
            symbolSize: 4,
            lineStyle: {
              width: 2,
              color: teamColor
            },
            areaStyle: {
              color: new echarts.graphic.RadialGradient(0.5, 0.5, 1, [
                { offset: 0, color: teamColor + 'cc' },
                { offset: 1, color: teamColor + '40' }
              ])
            },
            itemStyle: {
              color: teamColor,
              borderColor: '#fff',
              borderWidth: 1
            }
          }]
        }]
      };
      
      chart.setOption(option);
    }

    function initTeamRadarGrids() {
      if (!nbaData.teams || nbaData.teams.length === 0) return;

      const eastContainer = document.getElementById('eastTeamRadarGrid');
      const westContainer = document.getElementById('westTeamRadarGrid');
      
      eastContainer.innerHTML = '';
      westContainer.innerHTML = '';

      nbaData.teams.forEach(team => {
        const teamCode = getTeamCode(team.teamname || team.Team);
        
        if (EAST_TEAMS.includes(teamCode)) {
          createTeamRadarCard(team, eastContainer);
        } else if (WEST_TEAMS.includes(teamCode)) {
          createTeamRadarCard(team, westContainer);
        }
      });

      window.addEventListener('resize', () => {
        teamRadarCharts.forEach(chart => chart.resize());
      });
    }

    loadData();
  </script>
  <script src="./js/gsap-animations.js"></script>
</body>
</html>
