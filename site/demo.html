<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>3D球员展示 · StatCourt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0f1a;
      --bg-secondary: rgba(15, 25, 40, 0.9);
      --bg-card: rgba(20, 35, 55, 0.8);
      --accent: #06b6d4;
      --accent-light: #22d3ee;
      --accent-glow: rgba(6, 182, 212, 0.3);
      --accent2: #3b82f6;
      --accent2-light: #60a5fa;
      --text-primary: #f0f9ff;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: rgba(148, 163, 184, 0.1);
      --success: #10b981;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(10, 15, 26, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .brand span {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 32px;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text-primary);
    }

    .controls-panel {
      position: fixed;
      top: 80px;
      left: 24px;
      z-index: 100;
      background: var(--bg-secondary);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      min-width: 260px;
      transition: all 0.3s ease;
    }

    .controls-panel.collapsed {
      padding: 0;
      min-width: auto;
    }

    .controls-panel.collapsed .controls-content {
      display: none;
    }

    .controls-panel.collapsed .controls-title {
      padding: 12px 16px;
      margin-bottom: 0;
      cursor: pointer;
    }

    .toggle-btn {
      width: 28px;
      height: 28px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      margin-left: auto;
      flex-shrink: 0;
    }

    .toggle-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .controls-panel.collapsed .toggle-btn {
      transform: rotate(180deg);
    }

    .controls-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--accent-light);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .controls-content {
      overflow: hidden;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: block;
    }

    .team-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }

    .team-btn {
      padding: 6px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .team-btn:hover,
    .team-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: var(--bg-card);
      border-radius: 2px;
      outline: none;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    .slider-value {
      font-size: 0.8rem;
      color: var(--accent-light);
      min-width: 40px;
      text-align: right;
    }

    .info-panel {
      position: fixed;
      top: 80px;
      right: 24px;
      z-index: 100;
      background: var(--bg-secondary);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 320px;
      display: none;
    }

    .info-panel.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .player-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .player-avatar {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      overflow: hidden;
    }

    .player-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .player-info h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .player-info p {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat-box {
      background: var(--bg-card);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-box .value {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent-light);
    }

    .stat-box .label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .advanced-stats {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .advanced-stats h4 {
      font-size: 0.85rem;
      color: var(--accent2-light);
      margin-bottom: 12px;
    }

    .advanced-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .advanced-stat:last-child {
      border-bottom: none;
    }

    .advanced-stat .name {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .advanced-stat .val {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .close-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      background: var(--bg-card);
      border: none;
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      background: var(--accent);
      color: white;
    }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: var(--bg-secondary);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 12px 24px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hint-icon {
      color: var(--accent);
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 20px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .error-message {
      text-align: center;
      color: var(--text-secondary);
      padding: 20px;
    }

    .error-message p {
      margin-bottom: 10px;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 16px 24px;
      color: var(--text-muted);
      font-size: 0.75rem;
      background: rgba(10, 15, 26, 0.6);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      z-index: 100;
    }

    @media (max-width: 900px) {
      .controls-panel {
        display: none;
      }
      
      .info-panel {
        width: 280px;
        right: 12px;
      }
      
      .nav-links { display: none; }
    }
  </style>
</head>

    {

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const API_BASE_URL = 'http://localhost:8081';
    
    window.toggleControls = function() {
      const panel = document.getElementById('controlsPanel');
      panel.classList.toggle('collapsed');
    };

    let scene, camera, renderer, controls;
    let playerCards = [];
    let allPlayers = [];
    let allAdvancedPlayers = [];
    let currentFilter = 'all';
    let currentPlayerCount = 30;

    const teamColors = {
      '湖人': '#552583',
      '勇士': '#1D428A',
      '凯尔特人': '#007A33',
      '热火': '#98002E',

      '篮网': '#000000',
      '公牛': '#CE1141',
      '火箭': '#CE1141',
      '快船': '#C8102E',
      '马刺': '#C4CED4',
      '尼克斯': '#F58426',
      '魔术': '#0077C0',
      '步行者': '#002D62',
      '鹈鹕': '#0C2340',

      '爵士': '#002B5C',
      '黄蜂': '#1D1160',
      '活塞': '#C8102E',
      '奇才': '#002B5C',
      '灰熊': '#5D76A9',
      '开拓者': '#E03A3E'
    };

    const nameMapping = {
      '卢卡东契奇': 'Luka Dončić',
      '谢伊吉尔杰斯-亚历山大': 'Shai Gilgeous-Alexander',
      '安东尼爱德华兹': 'Anthony Edwards',
      '泰雷塞马克西': 'Tyrese Maxey',
      '杰伦布朗': 'Jaylen Brown',
      '尼古拉约基奇': 'Nikola Jokić',
      '多诺万米切尔': 'Donovan Mitchell',
      '科怀伦纳德': 'Kawhi Leonard',
      '扬尼斯安特托昆博': 'Giannis Antetokounmpo',
      '斯蒂芬库里': 'Stephen Curry',
      '勒布朗詹姆斯': 'LeBron James',
      '詹姆斯哈登': 'James Harden',
      '凯文杜兰特': 'Kevin Durant',
      '杰森塔图姆': 'Jayson Tatum',
      '安东尼戴维斯': 'Anthony Davis',
      '德文布克': 'Devin Booker'
    };

    function setLoadingText(text) {
      const el = document.getElementById('loadingOverlay');
      if (el) {
        const textEl = el.querySelector('.loading-text');
        if (textEl) textEl.textContent = text;
      }
    }

    function showError(message) {
      const el = document.getElementById('loadingOverlay');
      if (el) {
        el.innerHTML = `<div class="error-message">${message}</div>`;
      }
    }

    async function loadData() {
      try {
        setLoadingText('正在加载数据...');
        
        const [basicRes, advancedRes] = await Promise.all([
          fetch(`${API_BASE_URL}/api/data`),
          fetch(`${API_BASE_URL}/api/advanced/all?orderBy=bpm&limit=700`)
        ]);

        if (!basicRes.ok || !advancedRes.ok) {
          throw new Error('API请求失败');
        }

        const basicData = await basicRes.json();
        const advancedData = await advancedRes.json();

        if (basicData.code === 200 || basicData.code === 0) {
          allPlayers = basicData.data.players || [];
        }

        if (advancedData.code === 200 || advancedData.code === 0) {
          allAdvancedPlayers = advancedData.data || [];
        }

        console.log('加载球员数据:', allPlayers.length);
        console.log('加载高阶数据:', allAdvancedPlayers.length);

        if (allPlayers.length === 0) {
          throw new Error('没有加载到球员数据');
        }

        setLoadingText('正在初始化3D场景...');
        
        initThreeJS();
        initTeamFilter();
        initEventListeners();
        createPlayerCards(currentPlayerCount);
        
        setTimeout(() => {
          document.getElementById('loadingOverlay').classList.add('hidden');
        }, 500);
        
        animate();
        
      } catch (error) {
        console.error('加载数据失败:', error);
        showError(`
          <p style="font-size: 1.2rem; margin-bottom: 10px;">加载数据失败</p>
          <p style="font-size: 0.9rem;">请确保后端服务正在运行</p>
          <p style="font-size: 0.8rem; margin-top: 10px; color: var(--accent);">http://localhost:8081</p>
          <p style="font-size: 0.8rem; margin-top: 10px;">错误: ${error.message}</p>
        `);
      }
    }

    function initThreeJS() {
      const container = document.getElementById('canvas-container');
      
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0f1a);
      
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 5, 25);
      
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);
      
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 8;
      controls.maxDistance = 50;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 1.0;
      
      createParticleBackground();
      createCenterPlatform();
      
      window.addEventListener('resize', onWindowResize);
      renderer.domElement.addEventListener('click', onMouseClick);
    }

    function createParticleBackground() {
      const particleCount = 3000;
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const colors = new Float32Array(particleCount * 3);
      const sizes = new Float32Array(particleCount);
      
      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        positions[i3] = (Math.random() - 0.5) * 150;
        positions[i3 + 1] = (Math.random() - 0.5) * 100;
        positions[i3 + 2] = (Math.random() - 0.5) * 150;
        
        const colorChoice = Math.random();
        if (colorChoice < 0.4) {
          colors[i3] = 0.024; colors[i3 + 1] = 0.714; colors[i3 + 2] = 0.831;
        } else if (colorChoice < 0.7) {
          colors[i3] = 0.231; colors[i3 + 1] = 0.510; colors[i3 + 2] = 0.965;
        } else {
          colors[i3] = 0.976; colors[i3 + 1] = 0.451; colors[i3 + 2] = 0.086;
        }
        
        sizes[i] = Math.random() * 0.3 + 0.1;
      }
      
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
      
      const material = new THREE.PointsMaterial({
        size: 0.2,
        transparent: true,
        opacity: 0.7,
        vertexColors: true,
        blending: THREE.AdditiveBlending
      });
      
      const particles = new THREE.Points(geometry, material);
      particles.name = 'backgroundParticles';
      scene.add(particles);
    }

    function createCenterPlatform() {
      const platformGroup = new THREE.Group();
      
      const geometry = new THREE.CylinderGeometry(15, 15, 0.5, 64);
      const material = new THREE.MeshPhongMaterial({
        color: 0x0a0f1a,
        transparent: true,
        opacity: 0.9,
        shininess: 100
      });
      const platform = new THREE.Mesh(geometry, material);
      platform.position.y = -3;
      platform.receiveShadow = true;
      platformGroup.add(platform);
      
      const ringGeometry = new THREE.TorusGeometry(15, 0.15, 16, 100);
      const ringMaterial = new THREE.MeshBasicMaterial({
        color: 0x06b6d4,
        transparent: true,
        opacity: 0.8
      });
      const ring = new THREE.Mesh(ringGeometry, ringMaterial);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = -2.7;
      platformGroup.add(ring);
      
      const innerRingGeometry = new THREE.TorusGeometry(10, 0.1, 16, 100);
      const innerRing = new THREE.Mesh(innerRingGeometry, ringMaterial.clone());
      innerRing.material.color.setHex(0x3b82f6);
      innerRing.rotation.x = -Math.PI / 2;
      innerRing.position.y = -2.7;
      platformGroup.add(innerRing);
      
      const gridHelper = new THREE.GridHelper(30, 30, 0x06b6d4, 0x0a1628);
      gridHelper.position.y = -2.9;
      gridHelper.material.opacity = 0.3;
      gridHelper.material.transparent = true;
      platformGroup.add(gridHelper);
      
      scene.add(platformGroup);
      
      createFloatingBasketball();
      createAmbientLights();
      createEnergyBeams();
    }

    function createFloatingBasketball() {
      const ballGroup = new THREE.Group();
      
      const ballGeometry = new THREE.SphereGeometry(1.2, 32, 32);
      const ballMaterial = new THREE.MeshPhongMaterial({
        color: 0xf97316,
        shininess: 100,
        emissive: 0xf97316,
        emissiveIntensity: 0.1
      });
      const ball = new THREE.Mesh(ballGeometry, ballMaterial);
      ballGroup.add(ball);
      
      const lineMaterial = new THREE.LineBasicMaterial({ color: 0x1a1a1a, linewidth: 2 });
      
      const curve1 = new THREE.EllipseCurve(0, 0, 1.22, 1.22, 0, 2 * Math.PI, false, 0);
      const points1 = curve1.getPoints(50);
      const lineGeometry1 = new THREE.BufferGeometry().setFromPoints(points1.map(p => new THREE.Vector3(p.x, 0, p.y)));
      const line1 = new THREE.Line(lineGeometry1, lineMaterial);
      ballGroup.add(line1);
      
      const curve2 = new THREE.EllipseCurve(0, 0, 1.22, 1.22, 0, 2 * Math.PI, false, 0);
      const points2 = curve2.getPoints(50);
      const lineGeometry2 = new THREE.BufferGeometry().setFromPoints(points2.map(p => new THREE.Vector3(0, p.x, p.y)));
      const line2 = new THREE.Line(lineGeometry2, lineMaterial);
      ballGroup.add(line2);
      
      const glowGeometry = new THREE.SphereGeometry(1.5, 32, 32);
      const glowMaterial = new THREE.MeshBasicMaterial({
        color: 0xf97316,
        transparent: true,
        opacity: 0.15,
        side: THREE.BackSide
      });
      const glow = new THREE.Mesh(glowGeometry, glowMaterial);
      ballGroup.add(glow);
      
      ballGroup.position.set(0, 8, 0);
      ballGroup.name = 'floatingBasketball';
      scene.add(ballGroup);
    }

    function createAmbientLights() {
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
      scene.add(ambientLight);
      
      const spotLight1 = new THREE.SpotLight(0x06b6d4, 1, 50, Math.PI / 4, 0.5);
      spotLight1.position.set(20, 20, 20);
      spotLight1.castShadow = true;
      scene.add(spotLight1);
      
      const spotLight2 = new THREE.SpotLight(0x3b82f6, 1, 50, Math.PI / 4, 0.5);
      spotLight2.position.set(-20, 20, -20);
      scene.add(spotLight2);
      
      const pointLight = new THREE.PointLight(0xf97316, 0.5, 30);
      pointLight.position.set(0, 10, 0);
      scene.add(pointLight);
    }

    function createEnergyBeams() {
      const beamGroup = new THREE.Group();
      beamGroup.name = 'energyBeams';
      
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2;
        const beamGeometry = new THREE.CylinderGeometry(0.05, 0.05, 20, 8);
        const beamMaterial = new THREE.MeshBasicMaterial({
          color: i % 2 === 0 ? 0x06b6d4 : 0x3b82f6,
          transparent: true,
          opacity: 0.3
        });
        const beam = new THREE.Mesh(beamGeometry, beamMaterial);
        beam.position.set(Math.cos(angle) * 18, 7, Math.sin(angle) * 18);
        beamGroup.add(beam);
      }
      
      scene.add(beamGroup);
    }

    function initTeamFilter() {
      const teams = [...new Set(allPlayers.map(p => p.team))].filter(t => t);
      const filterContainer = document.getElementById('teamFilter');
      
      teams.forEach(team => {
        const btn = document.createElement('button');
        btn.className = 'team-btn';
        btn.dataset.team = team;
        btn.textContent = team;
        filterContainer.appendChild(btn);
      });
    }

    function initEventListeners() {
      document.getElementById('closeBtn').addEventListener('click', closeInfoPanel);
      
      document.getElementById('teamFilter').addEventListener('click', (e) => {
        if (e.target.classList.contains('team-btn')) {
          filterByTeam(e.target.dataset.team);
        }
      });
      
      document.getElementById('playerCount').addEventListener('input', (e) => {
        updatePlayerCount(e.target.value);
      });
      
      document.getElementById('rotationSpeed').addEventListener('input', (e) => {
        updateRotationSpeed(e.target.value);
      });
    }

    function filterByTeam(team) {
      currentFilter = team;
      
      document.querySelectorAll('.team-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.team === team);
      });
      
      clearPlayerCards();
      
      const filteredPlayers = team === 'all' 
        ? allPlayers 
        : allPlayers.filter(p => p.team === team);
      
      createPlayerCards(Math.min(filteredPlayers.length, currentPlayerCount), filteredPlayers);
    }

    function updatePlayerCount(count) {
      currentPlayerCount = parseInt(count);
      document.getElementById('countValue').textContent = count;
      
      clearPlayerCards();
      
      const filteredPlayers = currentFilter === 'all' 
        ? allPlayers 
        : allPlayers.filter(p => p.team === currentFilter);
      
      createPlayerCards(Math.min(filteredPlayers.length, currentPlayerCount), filteredPlayers);
    }

    function updateRotationSpeed(value) {
      const speed = value / 100;
      document.getElementById('speedValue').textContent = value + '%';
      if (controls) {
        controls.autoRotateSpeed = speed * 2;
      }
    }

    function createPlayerCards(count, players = null) {
      const playersToShow = players || allPlayers;
      const selectedPlayers = playersToShow.slice(0, count);
      
      if (selectedPlayers.length === 0) return;
      
      const radius = 12;
      const angleStep = (2 * Math.PI) / selectedPlayers.length;
      
      selectedPlayers.forEach((player, index) => {
        const angle = angleStep * index;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const y = Math.sin(index * 0.3) * 1.5;
        
        const card = createPlayerCard(player, index);
        card.position.set(x, y, z);
        card.lookAt(0, y, 0);
        card.userData = { player, index, baseY: y };
        
        scene.add(card);
        playerCards.push(card);
      });
    }

    function createPlayerCard(player, index) {
      const group = new THREE.Group();
      
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 320;
      const ctx = canvas.getContext('2d');
      
      const teamColor = teamColors[player.team] || '#1a2027';
      
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, teamColor);
      gradient.addColorStop(1, '#0a0f1a');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.strokeStyle = 'rgba(6, 182, 212, 0.6)';
      ctx.lineWidth = 3;
      ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);
      
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 22px Inter, sans-serif';
      ctx.textAlign = 'center';
      
      const name = player.playerName || player.PlayerName || 'Unknown';
      const displayName = name.length > 6 ? name.substring(0, 6) + '...' : name;
      ctx.fillText(displayName, canvas.width / 2, 45);
      
      ctx.font = '14px Inter, sans-serif';
      ctx.fillStyle = '#94a3b8';
      ctx.fillText(player.team || '-', canvas.width / 2, 70);
      
      ctx.font = 'bold 42px Inter, sans-serif';
      ctx.fillStyle = '#22d3ee';
      ctx.fillText((player.score || player.Score || 0).toFixed(1), canvas.width / 2, 130);
      ctx.font = '12px Inter, sans-serif';
      ctx.fillStyle = '#64748b';
      ctx.fillText('PPG', canvas.width / 2, 150);
      
      const stats = [
        { label: 'REB', value: (player.rebound || player.Rebound || 0).toFixed(1) },
        { label: 'AST', value: (player.assist || player.Assist || 0).toFixed(1) },
        { label: 'STL', value: (player.steal || player.Steal || 0).toFixed(1) }
      ];
      
      stats.forEach((stat, i) => {
        const x = 50 + i * 80;
        ctx.font = 'bold 18px Inter, sans-serif';
        ctx.fillStyle = '#f0f9ff';
        ctx.fillText(stat.value, x, 200);
        ctx.font = '11px Inter, sans-serif';
        ctx.fillStyle = '#64748b';
        ctx.fillText(stat.label, x, 218);
      });
      
      ctx.fillStyle = 'rgba(6, 182, 212, 0.2)';
      ctx.fillRect(20, canvas.height - 50, canvas.width - 40, 35);
      ctx.font = '12px Inter, sans-serif';
      ctx.fillStyle = '#22d3ee';
      ctx.fillText('点击查看详情', canvas.width / 2, canvas.height - 28);
      
      const texture = new THREE.CanvasTexture(canvas);
      const cardGeometry = new THREE.PlaneGeometry(2, 2.5);
      const cardMaterial = new THREE.MeshBasicMaterial({
        map: texture,
        transparent: true,
        side: THREE.DoubleSide
      });
      
      const card = new THREE.Mesh(cardGeometry, cardMaterial);
      group.add(card);
      
      const glowGeometry = new THREE.PlaneGeometry(2.2, 2.7);
      const glowMaterial = new THREE.MeshBasicMaterial({
        color: new THREE.Color(teamColor),
        transparent: true,
        opacity: 0.2,
        side: THREE.DoubleSide
      });
      const glow = new THREE.Mesh(glowGeometry, glowMaterial);
      glow.position.z = -0.05;
      group.add(glow);
      
      return group;
    }

    function clearPlayerCards() {
      playerCards.forEach(card => {
        scene.remove(card);
        card.traverse(child => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (child.material.map) child.material.map.dispose();
            child.material.dispose();
          }
        });
      });
      playerCards = [];
    }

    function onMouseClick(event) {
      const mouse = new THREE.Vector2();
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      
      const raycaster = new THREE.Raycaster();
      raycaster.setFromCamera(mouse, camera);
      
      const intersects = raycaster.intersectObjects(playerCards, true);
      
      if (intersects.length > 0) {
        let clickedCard = intersects[0].object;
        while (clickedCard.parent && !clickedCard.userData.player) {
          clickedCard = clickedCard.parent;
        }
        
        if (clickedCard.userData.player) {
          showPlayerInfo(clickedCard.userData.player);
        }
      }
    }

    function showPlayerInfo(player) {
      const panel = document.getElementById('infoPanel');
      
      document.getElementById('playerName').textContent = player.playerName || player.PlayerName || '-';
      document.getElementById('playerTeam').textContent = player.team || '-';
      
      const avatar = document.getElementById('playerAvatar');
      if (player.playerImage || player.PlayerImage) {
        avatar.innerHTML = `<img src="${player.playerImage || player.PlayerImage}" alt="avatar">`;
      } else {
        avatar.textContent = (player.playerName || player.PlayerName || '?').charAt(0);
      }
      
      document.getElementById('statScore').textContent = (player.score || player.Score || 0).toFixed(1);
      document.getElementById('statRebound').textContent = (player.rebound || player.Rebound || 0).toFixed(1);
      document.getElementById('statAssist').textContent = (player.assist || player.Assist || 0).toFixed(1);
      document.getElementById('statSteal').textContent = (player.steal || player.Steal || 0).toFixed(1);
      
      const chineseName = player.playerName || player.PlayerName;
      const advanced = findAdvancedPlayer(chineseName);
      
      if (advanced) {
        document.getElementById('statPER').textContent = advanced.per || '-';
        document.getElementById('statWS').textContent = advanced.ws || '-';
        document.getElementById('statBPM').textContent = advanced.bpm || '-';
        document.getElementById('statVORP').textContent = advanced.vorp || '-';
      } else {
        document.getElementById('statPER').textContent = '-';
        document.getElementById('statWS').textContent = '-';
        document.getElementById('statBPM').textContent = '-';
        document.getElementById('statVORP').textContent = '-';
      }
      
      panel.classList.add('show');
    }

    function findAdvancedPlayer(chineseName) {
      const englishName = nameMapping[chineseName];
      
      if (englishName) {
        let found = allAdvancedPlayers.find(p => 
          p.player && p.player.toLowerCase() === englishName.toLowerCase()
        );
        if (found) return found;
        
        const lastName = englishName.split(' ').pop();
        found = allAdvancedPlayers.find(p => 
          p.player && p.player.toLowerCase().includes(lastName.toLowerCase())
        );
        if (found) return found;
      }
      
      return null;
    }

    function closeInfoPanel() {
      document.getElementById('infoPanel').classList.remove('show');
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      
      if (controls) controls.update();
      
      const time = Date.now() * 0.001;
      
      playerCards.forEach((card, index) => {
        if (card.userData.baseY !== undefined) {
          card.position.y = card.userData.baseY + Math.sin(time + index * 0.5) * 0.3;
          card.rotation.y = Math.sin(time * 0.5 + index * 0.3) * 0.1;
        }
      });
      
      const basketball = scene.getObjectByName('floatingBasketball');
      if (basketball) {
        basketball.position.y = 8 + Math.sin(time * 2) * 0.5;
        basketball.rotation.y = time * 0.5;
        basketball.rotation.x = time * 0.3;
      }
      
      const particles = scene.getObjectByName('backgroundParticles');
      if (particles) {
        particles.rotation.y = time * 0.05;
        const positions = particles.geometry.attributes.position.array;
        for (let i = 1; i < positions.length; i += 3) {
          positions[i] += Math.sin(time + i) * 0.002;
        }
        particles.geometry.attributes.position.needsUpdate = true;
      }
      
      const beams = scene.getObjectByName('energyBeams');
      if (beams) {
        beams.children.forEach((beam, i) => {
          beam.material.opacity = 0.2 + Math.sin(time * 2 + i) * 0.15;
        });
      }
      
      renderer.render(scene, camera);
    }

    loadData();
  </script>
  <script src="./js/gsap-animations.js"></script>
</body>
</html>
